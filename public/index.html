<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TRN — Portal de Propuestas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=JetBrains+Mono:wght@400;500&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--dark:#0B1A2E;--navy:#112240;--mid:#1B3A5C;--amber:#F5A623;--orange:#FF6B35;--green:#2ECC71;--teal:#00B894;--white:#F8FAFE;--gray:#8892B0;--light:#CCD6F6;--danger:#e74c3c;--card:rgba(17,34,64,0.9);--border:rgba(245,166,35,0.15)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--dark);color:var(--white);min-height:100dvh;display:flex;align-items:center;justify-content:center;overflow-x:hidden}
.login-wrapper{width:100%;max-width:420px;padding:1.5rem}
.logo-area{text-align:center;margin-bottom:2rem}
.logo-area img{height:64px;margin-bottom:0.75rem}
.logo-fallback{font-family:'Outfit',sans-serif;font-size:2.5rem;font-weight:800;color:var(--orange);display:none}
.subtitle{font-family:'Outfit',sans-serif;font-size:0.7rem;letter-spacing:0.35em;text-transform:uppercase;color:var(--gray);margin-top:0.5rem}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:2rem;backdrop-filter:blur(12px)}
.card h2{font-family:'Outfit',sans-serif;font-size:1.25rem;font-weight:700;margin-bottom:1.5rem;text-align:center;color:var(--light)}
.field{margin-bottom:1.25rem}
.field label{display:block;font-size:0.8rem;font-weight:500;color:var(--gray);margin-bottom:0.4rem;font-family:'Outfit',sans-serif}
.field input{width:100%;padding:0.75rem 1rem;border:1px solid var(--border);border-radius:10px;background:var(--dark);color:var(--white);font-family:'DM Sans',sans-serif;font-size:0.95rem;outline:none;transition:border-color .2s}
.field input:focus{border-color:var(--amber)}
.btn-primary{width:100%;padding:0.85rem;border:none;border-radius:10px;background:linear-gradient(135deg,var(--amber),var(--orange));color:#fff;font-family:'Outfit',sans-serif;font-weight:700;font-size:1rem;cursor:pointer;transition:opacity .2s;display:flex;align-items:center;justify-content:center;gap:0.5rem}
.btn-primary:hover{opacity:0.9}
.btn-primary:disabled{opacity:0.6;cursor:not-allowed}
.spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;display:none}
@keyframes spin{to{transform:rotate(360deg)}}
.error-msg{color:var(--danger);font-size:0.85rem;text-align:center;margin-top:1rem;min-height:1.2em}
</style>
</head>
<body>
<div class="login-wrapper">
  <div class="logo-area">
    <img src="assets/trn-logo.png" alt="TRN" onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
    <div class="logo-fallback">TRN</div>
    <div class="subtitle">Portal de Propuestas</div>
  </div>
  <div class="card">
    <h2>Iniciar sesión</h2>
    <form id="loginForm">
      <div class="field">
        <label>Correo electrónico</label>
        <input type="email" id="email" required autocomplete="email">
      </div>
      <div class="field">
        <label>Contraseña</label>
        <input type="password" id="password" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn-primary" id="btnLogin">
        <span class="spinner" id="spinner"></span>
        <span id="btnText">Entrar al portal</span>
      </button>
    </form>
    <div class="error-msg" id="errorMsg"></div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script>
firebase.initializeApp(FIREBASE_CONFIG);
const auth = firebase.auth();
const db = firebase.firestore();

const ADMIN_EMAILS = ['rogelio@ittelecom.com.mx', 'arellanes@ittelecom.com.mx', 'rogelioguerra@gmail.com'];

function redirectUser(uid) {
  const user = auth.currentUser;
  // Check email first as fast fallback
  if (user && ADMIN_EMAILS.includes(user.email)) {
    location.href = '/admin';
    return;
  }
  // Then check Firestore role
  db.collection('users').doc(uid).get().then(snap => {
    if (snap.exists && snap.data().role === 'admin') {
      location.href = '/admin';
    } else {
      location.href = '/portal';
    }
  }).catch(() => {
    // If Firestore fails, use email check
    if (user && ADMIN_EMAILS.includes(user.email)) {
      location.href = '/admin';
    } else {
      location.href = '/portal';
    }
  });
}

auth.onAuthStateChanged(user => {
  if (user) redirectUser(user.uid);
});

const form = document.getElementById('loginForm');
const btnLogin = document.getElementById('btnLogin');
const spinner = document.getElementById('spinner');
const btnText = document.getElementById('btnText');
const errorMsg = document.getElementById('errorMsg');

const errMap = {
  'auth/invalid-credential': 'Correo o contraseña incorrectos.',
  'auth/wrong-password': 'Contraseña incorrecta.',
  'auth/user-not-found': 'No existe una cuenta con ese correo.',
  'auth/too-many-requests': 'Demasiados intentos. Espera un momento.',
  'auth/network-request-failed': 'Error de red. Verifica tu conexión.',
  'auth/invalid-email': 'El correo no es válido.'
};

form.addEventListener('submit', async e => {
  e.preventDefault();
  errorMsg.textContent = '';
  btnLogin.disabled = true;
  spinner.style.display = 'block';
  btnText.textContent = 'Entrando…';
  try {
    const cred = await auth.signInWithEmailAndPassword(
      document.getElementById('email').value.trim(),
      document.getElementById('password').value
    );
    redirectUser(cred.user.uid);
  } catch (err) {
    errorMsg.textContent = errMap[err.code] || 'Error al iniciar sesión.';
    btnLogin.disabled = false;
    spinner.style.display = 'none';
    btnText.textContent = 'Entrar al portal';
  }
});
</script>

<script>
if("serviceWorker" in navigator){
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("/sw.js").then(r => console.log("SW registered")).catch(e => console.warn("SW error:",e));
  });
}
</script>
</body>
</html>
