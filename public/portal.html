<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TRN — Mis Propuestas</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=JetBrains+Mono:wght@400;500&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--dark:#0B1A2E;--navy:#112240;--mid:#1B3A5C;--amber:#F5A623;--orange:#FF6B35;--green:#2ECC71;--teal:#00B894;--white:#F8FAFE;--gray:#8892B0;--light:#CCD6F6;--danger:#e74c3c;--card:rgba(17,34,64,0.9);--border:rgba(245,166,35,0.15)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--dark);color:var(--white);min-height:100dvh;overflow-x:hidden}
.topbar{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0.75rem clamp(1rem,4vw,2rem);background:rgba(11,26,46,0.85);backdrop-filter:blur(16px);border-bottom:1px solid var(--border)}
.topbar-left{display:flex;align-items:center;gap:0.75rem}
.topbar-left img{height:36px}
.topbar-title{font-family:'Outfit',sans-serif;font-weight:700;font-size:1rem;color:var(--light)}
.btn-logout{padding:0.45rem 1rem;border:1px solid var(--border);border-radius:8px;background:transparent;color:var(--gray);font-family:'Outfit',sans-serif;font-size:0.8rem;cursor:pointer;transition:all .2s}
.btn-logout:hover{border-color:var(--amber);color:var(--amber)}
.container{padding:clamp(1rem,4vw,2.5rem)}
.greeting{font-family:'Outfit',sans-serif;font-size:clamp(1.25rem,3vw,1.75rem);font-weight:700;margin-bottom:1.5rem}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1.25rem}
.prop-card{position:relative;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1.5rem;cursor:pointer;transition:transform .2s,border-color .2s;display:flex;flex-direction:column;gap:0.75rem;position:relative;overflow:hidden}
.prop-card:hover{transform:translateY(-2px);border-color:var(--amber)}
.prop-card:hover .arrow{transform:translateX(4px)}
.badge{display:inline-block;padding:0.2rem 0.65rem;border-radius:20px;font-family:'Outfit',sans-serif;font-size:0.7rem;font-weight:600;text-transform:uppercase;letter-spacing:0.05em}
.badge-draft{background:rgba(136,146,176,0.2);color:var(--gray)}
.badge-review{background:rgba(245,166,35,0.15);color:var(--amber)}
.badge-sent{background:rgba(0,184,148,0.15);color:var(--teal)}
.badge-approved{background:rgba(46,204,113,0.15);color:var(--green)}
.prop-title{font-family:'Outfit',sans-serif;font-size:1.05rem;font-weight:700;color:var(--light)}
.prop-desc{font-size:0.85rem;color:var(--gray);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.tags{display:flex;flex-wrap:wrap;gap:0.4rem}
.tag{padding:0.15rem 0.55rem;border-radius:6px;font-size:0.7rem;background:rgba(27,58,92,0.8);color:var(--gray);font-family:'Outfit',sans-serif}
.prop-footer{display:flex;align-items:center;justify-content:space-between;font-size:0.75rem;color:var(--gray);margin-top:auto;padding-top:0.5rem;border-top:1px solid var(--border)}
.prop-footer span{font-family:'JetBrains Mono',monospace;font-size:0.7rem}
.arrow{color:var(--amber);font-size:1.1rem;transition:transform .2s}
.empty-state{text-align:center;padding:4rem 1rem;color:var(--gray)}
.empty-state .icon{font-size:3rem;margin-bottom:1rem}
.empty-state p{font-size:0.95rem}
/* Skeleton */
.skeleton-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1.5rem;display:flex;flex-direction:column;gap:0.75rem}
.skel{border-radius:6px;background:linear-gradient(90deg,var(--navy) 25%,var(--mid) 50%,var(--navy) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skel-badge{width:70px;height:22px}
.skel-title{width:75%;height:20px}
.skel-desc{width:100%;height:14px}
.skel-desc2{width:60%;height:14px}
.skel-footer{width:40%;height:12px;margin-top:auto}

.btn-del{position:absolute;top:.55rem;right:.55rem;z-index:2;padding:.2rem .5rem;border-radius:6px;background:rgba(231,76,60,.08);border:1px solid rgba(231,76,60,.18);color:rgba(231,76,60,.5);font-size:.68rem;font-weight:700;cursor:pointer;font-family:'Outfit',sans-serif;transition:all .18s;line-height:1;}
.btn-del:hover{background:rgba(231,76,60,.22);border-color:#e74c3c;color:#e74c3c;}
.del-confirm{display:none;position:absolute;top:.45rem;right:.45rem;z-index:3;background:#1B3A5C;border:1px solid rgba(231,76,60,.4);border-radius:8px;padding:.4rem .7rem;align-items:center;gap:.45rem;font-size:.72rem;white-space:nowrap;}
.del-confirm.show{display:flex;}
.del-confirm span{color:#ccd6f6;}
.del-yes{background:#e74c3c;color:#fff;border:none;border-radius:4px;padding:.2rem .55rem;cursor:pointer;font-weight:700;font-size:.7rem;}
.del-no{background:rgba(255,255,255,.08);color:#aaa;border:none;border-radius:4px;padding:.2rem .55rem;cursor:pointer;font-size:.7rem;}
/* v20260316-231604 */
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-left">
    <img src="assets/trn-logo.png" alt="TRN" onerror="this.style.display='none'">
    <span class="topbar-title">Portal TRN</span>
  </div>
  <button class="btn-logout" id="btnLogout">Salir</button>
</div>
<div class="container">
  <div class="greeting" id="greeting">Hola 👋</div>
  <div class="grid" id="grid">
    <!-- skeletons -->
    <div class="skeleton-card"><div class="skel skel-badge"></div><div class="skel skel-title"></div><div class="skel skel-desc"></div><div class="skel skel-desc2"></div><div class="skel skel-footer"></div></div>
    <div class="skeleton-card"><div class="skel skel-badge"></div><div class="skel skel-title"></div><div class="skel skel-desc"></div><div class="skel skel-desc2"></div><div class="skel skel-footer"></div></div>
    <div class="skeleton-card"><div class="skel skel-badge"></div><div class="skel skel-title"></div><div class="skel skel-desc"></div><div class="skel skel-desc2"></div><div class="skel skel-footer"></div></div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script>
firebase.initializeApp(FIREBASE_CONFIG);
const auth = firebase.auth();
const db = firebase.firestore();

const statusMap = {draft:'Borrador',review:'En revisión',sent:'Enviado',approved:'Aprobado'};
const badgeMap = {draft:'badge-draft',review:'badge-review',sent:'badge-sent',approved:'badge-approved'};

auth.onAuthStateChanged(async user => {
  if (!user) { location.href = '/'; return; }
  // Check role
  const uSnap = await db.collection('users').doc(user.uid).get().catch(() => null);
  if (uSnap && uSnap.exists && uSnap.data().role === 'admin') {
    location.href = '/admin'; return;
  }
  const name = (uSnap && uSnap.exists) ? uSnap.data().name : user.email;
  const first = name ? name.split(' ')[0] : '';
  document.getElementById('greeting').textContent = `Hola, ${first} 👋`;

  // Load proposals (own + linked)
  const grid = document.getElementById('grid');
  const uid = user.uid;

  function renderCard(doc, d, isLinked) {
    if (d._type === 'quote') return;
    if (d.folio && d.items && Array.isArray(d.versions) && d.versions.length === 0) return;
    const st = d.status || 'draft';
    const vers = d.versions ? d.versions.length : 0;
    const date = d.updatedAt ? new Date(d.updatedAt.toDate()).toLocaleDateString('es-MX') : '';
    const tags = (d.tags || []).map(t => `<span class="tag">${t}</span>`).join('');
    const linkedBadge = isLinked ? `<span class="tag" style="background:rgba(46,204,113,.15);color:#2ECC71;border-color:rgba(46,204,113,.2)">Compartida</span>` : '';
    return `
    <div class="prop-card" id="pc-${doc.id}">
      ${!isLinked ? `<div class="del-confirm" id="dc-${doc.id}"><span>Eliminar?</span><button class="del-yes" onclick="confirmDel('${doc.id}',event)">Sí</button><button class="del-no" onclick="cancelDel('${doc.id}',event)">No</button></div><button class="btn-del" onclick="askDel('${doc.id}',event)">🗑</button>` : ''}
      <div onclick="location.href='/viewer?id=${doc.id}'">
      <span class="badge ${badgeMap[st]}">${statusMap[st] || st}</span>
      <div class="prop-title">${d.title || 'Sin título'}</div>
      <div class="prop-desc">${d.description || ''}</div>
      <div class="tags">${tags}${linkedBadge}</div>
      <div class="prop-footer">
        <span>${vers} version${vers !== 1 ? 'es' : ''} · ${date}</span>
        <span class="arrow">→</span>
      </div>
    </div></div>`;
  }

  async function loadAllProposals() {
    grid.innerHTML = '';
    const rendered = new Set();
    const cards = [];

    // Own proposals
    const ownSnap = await db.collection('clients').doc(uid).collection('proposals')
      .orderBy('updatedAt','desc').get();
    ownSnap.forEach(doc => {
      const d = doc.data();
      const html = renderCard(doc, d, false);
      if (html) { cards.push({ts: d.updatedAt?.toDate?.()?.getTime()||0, html}); rendered.add(doc.id); }
    });

    // Linked proposals (where this client appears in linkedClients)
    try {
      const linkedSnap = await db.collectionGroup('proposals')
        .where('linkedClients','array-contains', uid)
        .get();
      linkedSnap.forEach(doc => {
        if (rendered.has(doc.id)) return;
        const d = doc.data();
        const html = renderCard(doc, d, true);
        if (html) { cards.push({ts: d.updatedAt?.toDate?.()?.getTime()||0, html}); rendered.add(doc.id); }
      });
    } catch(e) {
      // collectionGroup index may not exist yet — silently skip linked proposals
      console.warn('linkedClients query not available yet:', e.message);
    }

    if (!cards.length) {
      grid.innerHTML = '<div class="empty-state"><div class="icon">📭</div><p>Aún no tienes propuestas.<br>Tu ejecutivo las creará pronto.</p></div>';
      return;
    }
    cards.sort((a,b) => b.ts - a.ts);
    grid.innerHTML = cards.map(c => c.html).join('');
  }

  loadAllProposals();
});

document.getElementById('btnLogout').onclick = () => auth.signOut().then(() => location.href = '/');

function askDel(id,e){
  e.stopPropagation();
  document.getElementById('dc-'+id).classList.add('show');
}
function cancelDel(id,e){
  e.stopPropagation();
  document.getElementById('dc-'+id).classList.remove('show');
}
async function confirmDel(id,e){
  e.stopPropagation();
  const btn=e.target; btn.textContent='...'; btn.disabled=true;
  try{
    const uid=firebase.auth().currentUser.uid;
    await db.collection('clients').doc(uid).collection('proposals').doc(id).delete();
    const card=document.getElementById('pc-'+id);
    if(card){card.style.transition='opacity .25s';card.style.opacity='0';}
    setTimeout(()=>{if(card)card.remove();},280);
  }catch(err){
    alert('Error al eliminar: '+err.message);
    btn.textContent='Sí'; btn.disabled=false;
  }
}

</script>

<script>
if("serviceWorker" in navigator){
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("/sw.js").then(r => console.log("SW registered")).catch(e => console.warn("SW error:",e));
  });
}
</script>
</body>
</html>
