<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TRN — Visor de Propuesta</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--dark:#0B1A2E;--navy:#112240;--mid:#1B3A5C;--amber:#F5A623;--orange:#FF6B35;--green:#2ECC71;--teal:#00B894;--white:#F8FAFE;--gray:#8892B0;--light:#CCD6F6;--danger:#e74c3c;--card:rgba(17,34,64,0.9);--border:rgba(245,166,35,0.15)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--dark);color:var(--white);min-height:100dvh;overflow-x:hidden}
.topbar{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0.75rem clamp(1rem,4vw,2rem);background:rgba(11,26,46,0.85);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);height:56px}
.topbar-left{display:flex;align-items:center;gap:0.75rem}
.topbar-left img{height:36px}
.topbar-title{font-family:'Outfit',sans-serif;font-weight:700;font-size:1rem;color:var(--light)}
.topbar-actions{display:flex;gap:0.5rem}
.btn-back,.btn-logout{padding:0.45rem 1rem;border:1px solid var(--border);border-radius:8px;background:transparent;color:var(--gray);font-family:'Outfit',sans-serif;font-size:0.8rem;cursor:pointer;transition:all .2s;text-decoration:none}
.btn-back:hover,.btn-logout:hover{border-color:var(--amber);color:var(--amber)}
.main-col{max-width:900px;margin:0 auto;padding:clamp(1rem,3vw,2rem)}
.proposal-title{font-family:'Outfit',sans-serif;font-size:clamp(1.25rem,3vw,1.75rem);font-weight:800;margin-bottom:0.5rem}
.proposal-desc{color:var(--gray);margin-bottom:1rem;line-height:1.6}
.tags{display:flex;flex-wrap:wrap;gap:0.4rem;margin-bottom:1.5rem}
.tag{padding:0.2rem 0.6rem;border-radius:6px;font-size:0.7rem;background:rgba(27,58,92,0.8);color:var(--gray);font-family:'Outfit',sans-serif}
.section-label{font-family:'Outfit',sans-serif;font-weight:700;font-size:0.85rem;color:var(--amber);text-transform:uppercase;letter-spacing:0.08em;margin:1.5rem 0 0.75rem;display:flex;align-items:center;gap:0.6rem}
.version-list{display:flex;flex-direction:column;gap:0.6rem;margin-bottom:1.5rem}
.version-item{display:flex;align-items:center;gap:0.75rem;padding:0.75rem 1rem;background:var(--card);border:1px solid var(--border);border-radius:10px}
.ver-badge{font-family:'JetBrains Mono',monospace;font-size:0.75rem;font-weight:500;padding:0.15rem 0.5rem;border-radius:6px;background:rgba(245,166,35,0.15);color:var(--amber)}
.ver-info{flex:1;font-size:0.8rem;color:var(--gray)}
.ver-info strong{color:var(--light);font-weight:500}
.ver-link{color:var(--amber);text-decoration:none;font-size:0.8rem;font-family:'Outfit',sans-serif;font-weight:600}
.ver-link:hover{text-decoration:underline}
/* Quote table */
.quote-view{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:clamp(1rem,2vw,1.5rem);margin-top:1rem}
.quote-table{width:100%;border-collapse:collapse;margin:1rem 0;font-size:0.85rem}
.quote-table th{text-align:left;padding:0.6rem;border-bottom:2px solid var(--amber);font-family:'Outfit',sans-serif;font-weight:600;color:var(--amber);font-size:0.75rem;text-transform:uppercase}
.quote-table td{padding:0.6rem;border-bottom:1px solid var(--border)}
.quote-table .num{font-family:'JetBrains Mono',monospace;text-align:right;color:var(--amber)}
.totals-block{max-width:320px;margin-left:auto;margin-top:1rem}
.total-row{display:flex;justify-content:space-between;padding:0.5rem 0;font-size:0.9rem;border-bottom:1px solid var(--border)}
.total-row.grand{font-family:'Outfit',sans-serif;font-weight:800;font-size:1.15rem;color:var(--amber);border-bottom:none;border-top:2px solid var(--amber);margin-top:0.25rem;padding-top:0.75rem}
.total-row .val{font-family:'JetBrains Mono',monospace}
/* Guarantee & conditions */
.guarantee-block,.conditions-block{margin-top:1.25rem;padding:1rem;background:rgba(0,0,0,0.15);border-radius:10px;border:1px solid var(--border)}
.guarantee-block p,.conditions-block p{font-size:0.85rem;color:var(--gray);line-height:1.6}
.cond-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.6rem}
.cond-item{font-size:0.82rem}
.cond-item strong{display:block;font-family:'Outfit',sans-serif;font-size:0.7rem;color:var(--amber);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:0.15rem}
.cond-item span{color:var(--light)}
/* Sticky notes */
.sticky-panel{display:none;background:rgba(0,0,0,.1);border-radius:12px;padding:.85rem 1rem;margin-top:.6rem;border:1px solid rgba(255,255,255,.06)}
.sticky-panel.open{display:block}
.sticky-notes{display:flex;flex-wrap:wrap;gap:.7rem;margin-bottom:.8rem;min-height:0}
.sticky-note{padding:.65rem .8rem;border-radius:3px;font-size:.75rem;line-height:1.55;max-width:200px;min-width:110px;box-shadow:2px 3px 10px rgba(0,0,0,.3);position:relative;font-family:'DM Sans',sans-serif}
.sticky-note:nth-child(5n+1){background:#FFF8DC;transform:rotate(-1.3deg);color:#333}
.sticky-note:nth-child(5n+2){background:#E1F5FE;transform:rotate(.9deg);color:#1a3a4a}
.sticky-note:nth-child(5n+3){background:#F3E5F5;transform:rotate(-.7deg);color:#3a1a4a}
.sticky-note:nth-child(5n+4){background:#FFF3E0;transform:rotate(1.1deg);color:#4a2a00}
.sticky-note:nth-child(5n+5){background:#E8F5E9;transform:rotate(-.5deg);color:#1a4a1a}
.sticky-note.mine{background:#DCEDC8!important;color:#1a3a00!important;transform:rotate(.4deg)!important}
.sticky-note-author{font-size:.62rem;font-weight:700;opacity:.5;margin-bottom:2px}
.sticky-note-time{font-size:.59rem;opacity:.4;text-align:right;margin-top:4px}
.sticky-inp-wrap{display:flex;gap:.5rem;align-items:flex-end}
.sticky-inp{flex:1;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:8px;color:#fff;padding:.5rem .75rem;font-family:'DM Sans',sans-serif;font-size:.84rem;resize:none;min-height:38px;outline:none;transition:border-color .2s}
.sticky-inp:focus{border-color:rgba(245,166,35,.4)}
.sticky-save{background:linear-gradient(135deg,#F5A623,#FF6B35);border:none;color:#0B1A2E;padding:.46rem 1rem;border-radius:8px;font-family:'Outfit',sans-serif;font-weight:700;font-size:.8rem;cursor:pointer;opacity:.25;pointer-events:none;transition:all .2s;white-space:nowrap;flex-shrink:0}
.sticky-save.active{opacity:1;pointer-events:auto;box-shadow:0 3px 12px rgba(245,166,35,.35)}
.btn-sticky-toggle{display:inline-flex;align-items:center;gap:.4rem;padding:.28rem .75rem;border-radius:20px;background:rgba(245,166,35,.1);border:1px solid rgba(245,166,35,.22);color:#F5A623;font-size:.72rem;font-weight:700;cursor:pointer;transition:all .18s;font-family:'Outfit',sans-serif}
.btn-sticky-toggle:hover{background:rgba(245,166,35,.2)}
.sticky-cnt{background:#F5A623;color:#0B1A2E;border-radius:50%;width:15px;height:15px;display:inline-flex;align-items:center;justify-content:center;font-size:.6rem;font-weight:800}
.btn-pdf-cot{display:inline-flex;align-items:center;gap:.4rem;padding:.48rem 1.2rem;border-radius:8px;background:linear-gradient(135deg,#F5A623,#FF6B35);color:#0B1A2E;font-family:'Outfit',sans-serif;font-weight:700;font-size:.83rem;text-decoration:none;box-shadow:0 4px 14px rgba(245,166,35,.28);transition:all .2s}
.btn-pdf-cot:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(245,166,35,.4)}
/* Loading */
.loader{display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1rem;padding:4rem;color:var(--gray)}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--amber);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
/* Empty */
.empty-state{text-align:center;color:var(--gray);font-size:0.85rem;padding:2rem}
@media(max-width:600px){.cond-grid{grid-template-columns:1fr}.quote-table th:nth-child(4),.quote-table td:nth-child(4){display:none}}
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-left">
    <img src="assets/trn-logo.png" alt="TRN" onerror="this.outerHTML='<span style=\'font-family:Outfit,sans-serif;font-weight:800;color:#F5A623;font-size:1.2rem\'>TRN</span>'">
    <span class="topbar-title">Propuesta</span>
  </div>
  <div class="topbar-actions">
    <a class="btn-back" id="btnBack" href="/portal">← Volver</a>
    <a id="topbar-cot-link" href="#" target="_blank" class="btn-pdf-cot" style="display:none">⬇ Cotización PDF</a>
    <button class="btn-logout" id="btnLogout">Salir</button>
  </div>
</div>
<div class="main-col" id="mainCol">
  <div class="loader"><div class="spinner"></div><span>Cargando propuesta…</span></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script>
firebase.initializeApp(FIREBASE_CONFIG);
const auth = firebase.auth();
const db = firebase.firestore();
const params = new URLSearchParams(location.search);
const proposalId = params.get('id');

let currentUid = null;
let cId = null;
let cName = 'Usuario';
let isAdmin = false;
const sL = {}; // section listeners

auth.onAuthStateChanged(async user => {
  if (!user) { location.href = '/'; return; }
  currentUid = user.uid;

  const uSnap = await db.collection('users').doc(user.uid).get().catch(() => null);
  const uData = uSnap && uSnap.exists ? uSnap.data() : {};
  isAdmin = uData.role === 'admin';
  cName = uData.name || uData.email || 'Usuario';

  if (isAdmin) document.getElementById('btnBack').href = '/admin';

  if (!proposalId) {
    document.getElementById('mainCol').innerHTML = '<div class="empty-state" style="color:var(--danger)">No se especificó propuesta.</div>';
    return;
  }

  let propSnap = null;
  if (isAdmin) {
    const clientsSnap = await db.collection('clients').get();
    for (const cDoc of clientsSnap.docs) {
      const pSnap = await cDoc.ref.collection('proposals').doc(proposalId).get();
      if (pSnap.exists) { propSnap = pSnap; cId = cDoc.id; break; }
    }
  } else {
    cId = user.uid;
    propSnap = await db.collection('clients').doc(user.uid).collection('proposals').doc(proposalId).get();
  }

  if (!propSnap || !propSnap.exists) {
    document.getElementById('mainCol').innerHTML = '<div class="empty-state" style="color:var(--danger)">Propuesta no encontrada o sin permisos.</div>';
    return;
  }

  renderProposal(propSnap.data());
});

/* ── Helpers ────────────────────────────────── */
function esc(t) { return String(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmt(n) { return Number(n||0).toLocaleString('es-MX',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fmtDate(ts) {
  if (!ts) return '';
  try {
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    return d.toLocaleDateString('es-MX',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});
  } catch(e) { return String(ts); }
}

/* ── Sticky-note comment system ─────────────── */
function scInnerHtml(section) {
  var sid='sci-'+section, svid='scsv-'+section;
  return '<div class="sticky-notes" id="scm-'+section+'"></div>'+
    '<div class="sticky-inp-wrap">'+
    '<textarea id="'+sid+'" class="sticky-inp" placeholder="Escribe tu comentario..." rows="1"'+
    ' oninput="this.style.height=\'auto\';this.style.height=this.scrollHeight+\'px\';'+
    'document.getElementById(\'scsv-'+section+'\').classList.toggle(\'active\',this.value.trim().length>0);"'+
    ' onkeydown="if(event.key===\'Enter\'&&!event.shiftKey){event.preventDefault();sendSC(\''+section+'\');}"></textarea>'+
    '<button id="'+svid+'" class="sticky-save" onclick="sendSC(\''+section+'\')">Guardar</button>'+
    '</div>';
}

function toggleSC(section) {
  const el = document.getElementById('sc-'+section);
  if (!el) return;
  el.classList.toggle('open');
  if (el.classList.contains('open')) listenSC(section);
}

function listenSC(section) {
  if (sL[section]) return;
  const ref = db.collection('clients').doc(cId).collection('comments')
    .where('proposalId','==',proposalId).where('section','==',section).orderBy('createdAt','asc');
  sL[section] = ref.onSnapshot(snap => {
    const cnt = document.getElementById('cnt-'+section);
    if (cnt) cnt.textContent = snap.size || '0';
    const msgsEl = document.getElementById('scm-'+section);
    if (!msgsEl) return;
    if (snap.empty) { msgsEl.innerHTML=''; return; }
    msgsEl.innerHTML = snap.docs.map(doc => {
      const c = doc.data(); const isMe = c.authorName === cName;
      return '<div class="sticky-note'+(isMe?' mine':'')+'">'+
        '<div class="sticky-note-author">'+esc(c.authorName||'')+'</div>'+
        '<div>'+esc(c.text||'')+'</div>'+
        '<div class="sticky-note-time">'+fmtDate(c.createdAt)+'</div></div>';
    }).join('');
  });
}

async function sendSC(section) {
  const inp = document.getElementById('sci-'+section);
  if (!inp) return;
  const text = inp.value.trim();
  if (!text || !cId) return;
  inp.value = '';
  inp.style.height = 'auto';
  const sv = document.getElementById('scsv-'+section);
  if (sv) sv.classList.remove('active');
  await db.collection('clients').doc(cId).collection('comments').add({
    proposalId, section, text, uid: currentUid, authorName: cName,
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  });
}

/* ── Render proposal ─────────────────────────── */
function renderProposal(d) {
  const main = document.getElementById('mainCol');
  const tags = (d.tags||[]).map(t => '<span class="tag">'+esc(t)+'</span>').join('');
  const versions = (d.versions||[]).map((v,i) =>
    '<div class="version-item">'+
      '<span class="ver-badge">v'+(i+1)+'</span>'+
      '<div class="ver-info"><strong>'+esc(v.label||('Versión '+(i+1)))+'</strong><br>'+esc(v.changelog||'')+'<br>'+esc(v.date||'')+'</div>'+
      (v.url ? '<a class="ver-link" href="'+esc(v.url)+'" target="_blank">Ver ↗</a>' : '')+
    '</div>'
  ).join('');

  // No iframe — removed
  const ifrHtml = '';

  // Quote: may be in d.items directly, or via d.quoteId (separate doc)
  let quoteHtml = '';
  let quoteData = null;
  if (d.items && d.items.length) {
    quoteData = d;
  } else if (d.quoteId) {
    // Load asynchronously
    db.collection('clients').doc(cId).collection('proposals').doc(d.quoteId).get()
      .then(qSnap => {
        if (qSnap.exists) {
          const qData = qSnap.data();
          const qHtml = renderQuote(qData, d.quoteId);
          const qSection = document.getElementById('quote-section');
          if (qSection) {
            qSection.innerHTML = qHtml;
            qSection.style.display = 'block';
            const tLink = document.getElementById('topbar-cot-link');
          if(tLink){tLink.href='/cotizacion?id='+proposalId+'&client='+cId;tLink.style.display='inline-flex';}
          }
        }
      }).catch(()=>{});
  }
  if (quoteData) quoteHtml = renderQuote(quoteData, null);

  main.innerHTML =
    '<h1 class="proposal-title">'+esc(d.title||'Sin título')+'</h1>'+
    '<p class="proposal-desc">'+esc(d.description||'')+'</p>'+
    '<div class="tags">'+tags+'</div>'+
    (d.folio ? '<div style="font-family:\'JetBrains Mono\',monospace;font-size:0.8rem;color:var(--gray);margin-bottom:0.5rem">Folio: '+esc(d.folio)+'</div>' : '')+
    (d.empresa ? '<div style="font-size:0.82rem;color:var(--light);margin-bottom:0.25rem">'+esc(d.empresa)+'</div>' : '')+
    (d.contacto ? '<div style="font-size:0.8rem;color:var(--gray);margin-bottom:1rem">Atención: '+esc(d.contacto)+'</div>' : '')+
    (versions ? '<div class="section-label">Versiones</div><div class="version-list">'+versions+'</div>' : '')+
    ifrHtml+
    '<div id="quote-section"'+(quoteHtml ? '' : ' style="display:none"')+'>'+quoteHtml+'</div>'+
    
    '<div style="margin-top:1.5rem">'+
      '<div class="section-label">Comentarios generales '+
        '<button class="btn-sticky-toggle" onclick="toggleSC(\'general\')">💬 <span class="sticky-cnt" id="cnt-general">0</span></button>'+
      '</div>'+
      '<div class="sticky-panel" id="sc-general">'+scInnerHtml('general')+'</div>'+
    '</div>';
}

/* ── Render quote (items table) ──────────────── */
function renderQuote(d, qId) {
  const sym = (d.moneda==='USD') ? 'US$' : '$';

  const rows = (d.items||[]).map(it => {
    if (it.tipo === 'texto') {
      return '<tr><td colspan="5" style="font-size:0.8rem;color:var(--gray);font-style:italic">'+esc(it.desc||it.description||'')+'</td></tr>';
    }
    const qty = it.qty || it.cantidad || 1;
    const price = it.price || it.precio || it.precioUnitario || 0;
    const disc = it.disc || it.descuento || 0;
    const total = qty * price * (1 - disc/100);
    const desc = it.desc || it.description || it.descripcion || '—';
    return '<tr>'+
      '<td>'+esc(desc)+'</td>'+
      '<td class="num">'+qty+'</td>'+
      '<td class="num">'+sym+fmt(price)+'</td>'+
      '<td class="num">'+(disc>0 ? disc+'%' : '—')+'</td>'+
      '<td class="num">'+sym+fmt(total)+'</td>'+
    '</tr>';
  }).join('');

  const ivaLabel = d.ivaRate ? (typeof d.ivaRate === 'number' && d.ivaRate < 1 ? (d.ivaRate*100) : d.ivaRate) + '%' : '16%';

  let garantiaHtml = '';
  if (d.garantiaDesc || d.garantiaTipo) {
    garantiaHtml =
      '<div class="guarantee-block">'+
        '<div class="section-label">Garantía '+
          '<button class="btn-sticky-toggle" onclick="toggleSC(\'garantia\')">💬 <span class="sticky-cnt" id="cnt-garantia">0</span></button>'+
        '</div>'+
        (d.garantiaTipo ? '<div style="font-size:0.75rem;color:var(--amber);margin-bottom:0.4rem;font-family:Outfit,sans-serif;font-weight:600">'+esc(d.garantiaTipo)+'</div>' : '')+
        '<p>'+esc(d.garantiaDesc||'')+'</p>'+
        '<div class="sticky-panel" id="sc-garantia">'+scInnerHtml('garantia')+'</div>'+
      '</div>';
  }

  let condHtml = '';
  const condItems = [];
  if (d.formaPago) condItems.push(['Forma de pago', d.formaPago]);
  if (d.incluye) condItems.push(['Instalación', d.incluye]);
  if (d.tiempoEntrega) condItems.push(['Tiempo de entrega', d.tiempoEntrega]);
  if (d.vigencia) condItems.push(['Vigencia', d.vigencia + ' días']);
  if (d.lugar) condItems.push(['Lugar de entrega', d.lugar]);

  if (condItems.length) {
    condHtml =
      '<div class="conditions-block">'+
        '<div class="section-label">Condiciones '+
          '<button class="btn-sticky-toggle" onclick="toggleSC(\'condiciones\')">💬 <span class="sticky-cnt" id="cnt-condiciones">0</span></button>'+
        '</div>'+
        '<div class="cond-grid">'+condItems.map(function(c){return '<div class="cond-item"><strong>'+esc(c[0])+'</strong><span>'+esc(c[1])+'</span></div>';}).join('')+'</div>'+
        (d.notas ? '<p style="margin-top:0.75rem;font-size:0.8rem;color:var(--gray);font-style:italic">'+esc(d.notas)+'</p>' : '')+
        '<div class="sticky-panel" id="sc-condiciones">'+scInnerHtml('condiciones')+'</div>'+
      '</div>';
  }

  return '<div class="quote-view">'+
    '<div style="display:flex;justify-content:flex-end;margin-bottom:1rem;">'+
      '<a href="/cotizacion?id='+proposalId+'&client='+cId+'" target="_blank" class="btn-pdf-cot">⬇ Descargar PDF</a>'+
    '</div>'+
    '<div class="section-label">Partidas '+
      '<button class="btn-sticky-toggle" onclick="toggleSC(\'partidas\')">💬 <span class="sticky-cnt" id="cnt-partidas">0</span></button>'+
    '</div>'+
    '<table class="quote-table">'+
      '<thead><tr><th>Descripción</th><th style="text-align:right">Cant.</th><th style="text-align:right">P.Unit.</th><th style="text-align:right">Desc.</th><th style="text-align:right">Total</th></tr></thead>'+
      '<tbody>'+rows+'</tbody>'+
    '</table>'+
    '<div class="sticky-panel" id="sc-partidas">'+scInnerHtml('partidas')+'</div>'+
    '<div class="totals-block">'+
      '<div class="total-row"><span>Subtotal</span><span class="val">'+sym+fmt(d.subtotal||0)+' '+(d.moneda||'')+'</span></div>'+
      '<div class="total-row"><span>IVA ('+ivaLabel+')</span><span class="val">'+sym+fmt(d.iva||0)+' '+(d.moneda||'')+'</span></div>'+
      '<div class="total-row grand"><span>Total</span><span class="val">'+sym+fmt(d.total||0)+' '+(d.moneda||'')+'</span></div>'+
    '</div>'+
    garantiaHtml+
    condHtml+
  '</div>';
}

/* ── Logout ─────────────────────────────────── */
document.getElementById('btnLogout').onclick = () => auth.signOut().then(() => location.href = '/');
</script>
</body>
</html>
