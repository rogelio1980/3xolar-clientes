<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TRN — Visor de Propuesta</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=JetBrains+Mono:wght@400;500&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--dark:#0B1A2E;--navy:#112240;--mid:#1B3A5C;--amber:#F5A623;--orange:#FF6B35;--green:#2ECC71;--teal:#00B894;--white:#F8FAFE;--gray:#8892B0;--light:#CCD6F6;--danger:#e74c3c;--card:rgba(17,34,64,0.9);--border:rgba(245,166,35,0.15)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--dark);color:var(--white);min-height:100dvh;overflow-x:hidden}
.topbar{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0.75rem clamp(1rem,4vw,2rem);background:rgba(11,26,46,0.85);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);height:56px}
.topbar-left{display:flex;align-items:center;gap:0.75rem}
.topbar-left img{height:36px}
.topbar-title{font-family:'Outfit',sans-serif;font-weight:700;font-size:1rem;color:var(--light)}
.topbar-actions{display:flex;gap:0.5rem}
.btn-back,.btn-logout{padding:0.45rem 1rem;border:1px solid var(--border);border-radius:8px;background:transparent;color:var(--gray);font-family:'Outfit',sans-serif;font-size:0.8rem;cursor:pointer;transition:all .2s;text-decoration:none}
.btn-back:hover,.btn-logout:hover{border-color:var(--amber);color:var(--amber)}
.layout{display:grid;grid-template-columns:1fr min(380px,35%);gap:0;min-height:calc(100dvh - 56px)}
@media(max-width:800px){.layout{grid-template-columns:1fr}.sidebar{border-left:none!important;border-top:1px solid var(--border)}}
.main-col{padding:clamp(1rem,3vw,2rem);overflow-y:auto}
.sidebar{border-left:1px solid var(--border);display:flex;flex-direction:column;height:calc(100dvh - 56px);position:sticky;top:56px}
.proposal-title{font-family:'Outfit',sans-serif;font-size:clamp(1.25rem,3vw,1.75rem);font-weight:800;margin-bottom:0.5rem}
.proposal-desc{color:var(--gray);margin-bottom:1rem;line-height:1.6}
.tags{display:flex;flex-wrap:wrap;gap:0.4rem;margin-bottom:1.5rem}
.tag{padding:0.2rem 0.6rem;border-radius:6px;font-size:0.7rem;background:rgba(27,58,92,0.8);color:var(--gray);font-family:'Outfit',sans-serif}
.section-label{font-family:'Outfit',sans-serif;font-weight:700;font-size:0.85rem;color:var(--amber);text-transform:uppercase;letter-spacing:0.08em;margin:1.5rem 0 0.75rem}
.version-list{display:flex;flex-direction:column;gap:0.6rem;margin-bottom:1.5rem}
.version-item{display:flex;align-items:center;gap:0.75rem;padding:0.75rem 1rem;background:var(--card);border:1px solid var(--border);border-radius:10px}
.ver-badge{font-family:'JetBrains Mono',monospace;font-size:0.75rem;font-weight:500;padding:0.15rem 0.5rem;border-radius:6px;background:rgba(245,166,35,0.15);color:var(--amber)}
.ver-info{flex:1;font-size:0.8rem;color:var(--gray)}
.ver-info strong{color:var(--light);font-weight:500}
.ver-link{color:var(--amber);text-decoration:none;font-size:0.8rem;font-family:'Outfit',sans-serif;font-weight:600}
.ver-link:hover{text-decoration:underline}
.preview-frame{width:100%;height:min(75vh,700px);border:1px solid var(--border);border-radius:10px;background:#fff}
/* Quote table */
.quote-table{width:100%;border-collapse:collapse;margin:1rem 0;font-size:0.85rem}
.quote-table th{text-align:left;padding:0.6rem;border-bottom:2px solid var(--amber);font-family:'Outfit',sans-serif;font-weight:600;color:var(--amber);font-size:0.75rem;text-transform:uppercase}
.quote-table td{padding:0.6rem;border-bottom:1px solid var(--border)}
.quote-table .num{font-family:'JetBrains Mono',monospace;text-align:right;color:var(--amber)}
.totals-block{max-width:320px;margin-left:auto;margin-top:1rem}
.total-row{display:flex;justify-content:space-between;padding:0.5rem 0;font-size:0.9rem;border-bottom:1px solid var(--border)}
.total-row.grand{font-family:'Outfit',sans-serif;font-weight:800;font-size:1.15rem;color:var(--amber);border-bottom:none;border-top:2px solid var(--amber);margin-top:0.25rem;padding-top:0.75rem}
.total-row .val{font-family:'JetBrains Mono',monospace}
/* Chat sidebar */
.chat-header{padding:1rem;border-bottom:1px solid var(--border);font-family:'Outfit',sans-serif;font-weight:700;font-size:0.9rem;color:var(--light)}
.messages{flex:1;overflow-y:auto;padding:1rem;display:flex;flex-direction:column;gap:0.6rem}
.msg{max-width:85%;padding:0.65rem 0.9rem;border-radius:12px;font-size:0.85rem;line-height:1.45}
.msg.other{background:var(--card);border:1px solid var(--border);align-self:flex-start;border-bottom-left-radius:4px}
.msg.mine{background:rgba(245,166,35,0.15);border:1px solid rgba(245,166,35,0.25);align-self:flex-end;border-bottom-right-radius:4px}
.msg .meta{font-size:0.65rem;color:var(--gray);margin-top:0.3rem;font-family:'JetBrains Mono',monospace}
.chat-input{padding:0.75rem;border-top:1px solid var(--border);display:flex;gap:0.5rem}
.chat-input textarea{flex:1;resize:none;padding:0.6rem;border:1px solid var(--border);border-radius:8px;background:var(--dark);color:var(--white);font-family:'DM Sans',sans-serif;font-size:0.85rem;outline:none;min-height:40px;max-height:100px}
.chat-input textarea:focus{border-color:var(--amber)}
.btn-send{padding:0.6rem 1rem;border:none;border-radius:8px;background:linear-gradient(135deg,var(--amber),var(--orange));color:#fff;font-family:'Outfit',sans-serif;font-weight:600;font-size:0.8rem;cursor:pointer}
.btn-send:hover{opacity:0.9}
.empty-chat{text-align:center;color:var(--gray);font-size:0.85rem;margin-top:2rem}
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-left">
    <img src="assets/trn-logo.png" alt="TRN" onerror="this.style.display='none'">
    <span class="topbar-title">Propuesta</span>
  </div>
  <div class="topbar-actions">
    <a class="btn-back" id="btnBack" href="/portal">← Volver</a>
    <button class="btn-logout" id="btnLogout">Salir</button>
  </div>
</div>
<div class="layout">
  <div class="main-col" id="mainCol">
    <div style="color:var(--gray);padding:2rem;text-align:center">Cargando propuesta…</div>
  </div>
  <div class="sidebar">
    <div class="chat-header">💬 Comentarios</div>
    <div class="messages" id="messages"></div>
    <div class="chat-input">
      <textarea id="chatInput" placeholder="Escribe un comentario…" rows="1"></textarea>
      <button class="btn-send" id="btnSend">Enviar</button>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script>
firebase.initializeApp(FIREBASE_CONFIG);
const auth = firebase.auth();
const db = firebase.firestore();
const params = new URLSearchParams(location.search);
const proposalId = params.get('id');

let currentUid = null;
let clientId = null;
let isAdmin = false;

auth.onAuthStateChanged(async user => {
  if (!user) { location.href = '/'; return; }
  currentUid = user.uid;

  const uSnap = await db.collection('users').doc(user.uid).get().catch(() => null);
  isAdmin = uSnap && uSnap.exists && uSnap.data().role === 'admin';

  if (isAdmin) {
    document.getElementById('btnBack').href = '/admin';
  }

  if (!proposalId) {
    document.getElementById('mainCol').innerHTML = '<div style="color:var(--danger);padding:2rem">No se especificó propuesta.</div>';
    return;
  }

  // Find the proposal — admin searches all clients, client uses own uid
  let propSnap = null;
  if (isAdmin) {
    const clientsSnap = await db.collection('clients').get();
    for (const cDoc of clientsSnap.docs) {
      const pSnap = await cDoc.ref.collection('proposals').doc(proposalId).get();
      if (pSnap.exists) { propSnap = pSnap; clientId = cDoc.id; break; }
    }
  } else {
    clientId = user.uid;
    propSnap = await db.collection('clients').doc(user.uid).collection('proposals').doc(proposalId).get();
  }

  if (!propSnap || !propSnap.exists) {
    document.getElementById('mainCol').innerHTML = '<div style="color:var(--danger);padding:2rem">Propuesta no encontrada o sin permisos.</div>';
    return;
  }

  renderProposal(propSnap.data());
  loadComments();
});

function fmt(n) {
  return Number(n).toLocaleString('es-MX', {minimumFractionDigits:2, maximumFractionDigits:2});
}

function renderProposal(d) {
  const main = document.getElementById('mainCol');
  const tags = (d.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('');
  const versions = (d.versions||[]).map((v,i) => `
    <div class="version-item">
      <span class="ver-badge">v${i+1}</span>
      <div class="ver-info"><strong>${v.label||('Versión '+(i+1))}</strong><br>${v.changelog||''}<br>${v.date||''}</div>
      ${v.url ? `<a class="ver-link" href="${v.url}" target="_blank">Ver ↗</a>` : ''}
    </div>`).join('');

  const latestUrl = d.versions && d.versions.length > 0 ? d.versions[d.versions.length-1].url : null;

  let itemsHtml = '';
  if (d.items && d.items.length) {
    const rows = d.items.map(it => {
      const total = (it.qty||1) * (it.price||0) * (1 - (it.disc||0)/100);
      return `<tr><td>${it.desc||''}</td><td class="num">${it.qty||1}</td><td class="num">$${fmt(it.price||0)}</td><td class="num">${it.disc||0}%</td><td class="num">$${fmt(total)}</td></tr>`;
    }).join('');
    itemsHtml = `
      <div class="section-label">Partidas</div>
      <table class="quote-table">
        <thead><tr><th>Descripción</th><th style="text-align:right">Cant.</th><th style="text-align:right">P.Unit.</th><th style="text-align:right">Desc.</th><th style="text-align:right">Total</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
      <div class="totals-block">
        <div class="total-row"><span>Subtotal</span><span class="val">$${fmt(d.subtotal||0)} ${d.moneda||''}</span></div>
        <div class="total-row"><span>IVA (${(d.ivaRate||0)*100}%)</span><span class="val">$${fmt(d.iva||0)} ${d.moneda||''}</span></div>
        <div class="total-row grand"><span>Total</span><span class="val">$${fmt(d.total||0)} ${d.moneda||''}</span></div>
      </div>`;
  }

  let previewHtml = '';
  if (latestUrl) {
    previewHtml = `<div class="section-label">Vista previa</div><iframe class="preview-frame" src="${latestUrl}" sandbox="allow-scripts allow-same-origin"></iframe>`;
  }

  main.innerHTML = `
    <h1 class="proposal-title">${d.title||'Sin título'}</h1>
    <p class="proposal-desc">${d.description||''}</p>
    <div class="tags">${tags}</div>
    ${d.folio ? `<div style="font-family:'JetBrains Mono',monospace;font-size:0.8rem;color:var(--gray);margin-bottom:0.5rem">Folio: ${d.folio}</div>` : ''}
    ${versions ? `<div class="section-label">Versiones</div><div class="version-list">${versions}</div>` : ''}
    ${itemsHtml}
    ${previewHtml}
  `;
}

function loadComments() {
  const msgContainer = document.getElementById('messages');
  db.collection('clients').doc(clientId).collection('comments')
    .where('proposalId','==',proposalId)
    .orderBy('createdAt','asc')
    .onSnapshot(snap => {
      msgContainer.innerHTML = '';
      if (snap.empty) {
        msgContainer.innerHTML = '<div class="empty-chat">Sin comentarios aún</div>';
        return;
      }
      snap.forEach(doc => {
        const c = doc.data();
        const isMine = c.uid === currentUid;
        const time = c.createdAt ? new Date(c.createdAt.toDate()).toLocaleString('es-MX',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}) : '';
        msgContainer.innerHTML += `<div class="msg ${isMine?'mine':'other'}"><div>${c.text}</div><div class="meta">${c.authorName||''}${time?' · '+time:''}</div></div>`;
      });
      msgContainer.scrollTop = msgContainer.scrollHeight;
    });
}

// Send comment
const chatInput = document.getElementById('chatInput');
const btnSend = document.getElementById('btnSend');

async function sendComment() {
  const text = chatInput.value.trim();
  if (!text || !clientId) return;
  chatInput.value = '';
  const uSnap = await db.collection('users').doc(currentUid).get().catch(()=>null);
  const authorName = uSnap && uSnap.exists ? uSnap.data().name : 'Usuario';
  await db.collection('clients').doc(clientId).collection('comments').add({
    proposalId, text, uid: currentUid, authorName,
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  });
}

btnSend.onclick = sendComment;
chatInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendComment(); }
});

document.getElementById('btnLogout').onclick = () => auth.signOut().then(() => location.href = '/');
</script>
</body>
</html>
